<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1B2A4A"/>
      <stop offset="55%" stop-color="#20233F"/>
      <stop offset="100%" stop-color="#241522"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="18%" r="55%">
      <stop offset="0%"  stop-color="#C9A227" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#C9A227" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="spineA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8C4A3E"/><stop offset="100%" stop-color="#6E362C"/>
    </linearGradient>
    <linearGradient id="spineB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A227"/><stop offset="100%" stop-color="#9C7C1D"/>
    </linearGradient>
    <linearGradient id="spineC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B7B6B"/><stop offset="100%" stop-color="#41594D"/>
    </linearGradient>
    <linearGradient id="spineD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A4A73"/><stop offset="100%" stop-color="#293656"/>
    </linearGradient>
    <linearGradient id="spineE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A2E2E"/><stop offset="100%" stop-color="#5C2222"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100A12" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Étagère (fine ligne de séparation) -->
  <rect x="0" y="566" width="1600" height="10" fill="#0F1626" opacity="0.6"/>
  <g transform="translate(0,566)">
    <rect x="0"   y="10" width="34" height="130" fill="url(#spineA)"/>
    <rect x="36"  y="0"  width="26" height="140" fill="url(#spineD)"/>
    <rect x="64"  y="22" width="30" height="118" fill="url(#spineC)"/>
    <rect x="96"  y="8"  width="22" height="132" fill="url(#spineB)"/>
    <rect x="120" y="18" width="34" height="122" fill="url(#spineE)"/>
    <rect x="156" y="0"  width="24" height="140" fill="url(#spineA)"/>
    <rect x="182" y="14" width="30" height="126" fill="url(#spineD)"/>
    <rect x="214" y="26" width="20" height="114" fill="url(#spineC)"/>
    <rect x="236" y="6"  width="34" height="134" fill="url(#spineB)"/>
    <rect x="272" y="16" width="26" height="124" fill="url(#spineE)"/>
    <rect x="300" y="0"  width="22" height="140" fill="url(#spineD)"/>
    <rect x="324" y="20" width="32" height="120" fill="url(#spineA)"/>
    <rect x="358" y="10" width="24" height="130" fill="url(#spineC)"/>
    <rect x="384" y="0"  width="30" height="140" fill="url(#spineB)"/>
    <rect x="416" y="24" width="22" height="116" fill="url(#spineE)"/>
    <rect x="440" y="12" width="34" height="128" fill="url(#spineD)"/>
    <rect x="476" y="4"  width="24" height="136" fill="url(#spineA)"/>
    <rect x="502" y="18" width="28" height="122" fill="url(#spineC)"/>
    <rect x="532" y="0"  width="22" height="140" fill="url(#spineB)"/>
    <rect x="556" y="22" width="34" height="118" fill="url(#spineE)"/>
    <rect x="1000" y="10" width="34" height="130" fill="url(#spineB)"/>
    <rect x="1036" y="0"  width="26" height="140" fill="url(#spineE)"/>
    <rect x="1064" y="22" width="30" height="118" fill="url(#spineA)"/>
    <rect x="1096" y="8"  width="22" height="132" fill="url(#spineD)"/>
    <rect x="1120" y="18" width="34" height="122" fill="url(#spineC)"/>
    <rect x="1156" y="0"  width="24" height="140" fill="url(#spineB)"/>
    <rect x="1182" y="14" width="30" height="126" fill="url(#spineE)"/>
    <rect x="1214" y="26" width="20" height="114" fill="url(#spineA)"/>
    <rect x="1236" y="6"  width="34" height="134" fill="url(#spineD)"/>
    <rect x="1272" y="16" width="26" height="124" fill="url(#spineC)"/>
    <rect x="1300" y="0"  width="22" height="140" fill="url(#spineE)"/>
    <rect x="1324" y="20" width="32" height="120" fill="url(#spineB)"/>
    <rect x="1358" y="10" width="24" height="130" fill="url(#spineA)"/>
    <rect x="1384" y="0"  width="30" height="140" fill="url(#spineD)"/>
    <rect x="1416" y="24" width="22" height="116" fill="url(#spineC)"/>
    <rect x="1440" y="12" width="34" height="128" fill="url(#spineB)"/>
    <rect x="1476" y="4"  width="24" height="136" fill="url(#spineE)"/>
    <rect x="1502" y="18" width="28" height="122" fill="url(#spineA)"/>
    <rect x="1532" y="0"  width="22" height="140" fill="url(#spineD)"/>
    <rect x="1556" y="22" width="34" height="118" fill="url(#spineB)"/>
  </g>

  <!-- Silhouette centrale : livre ouvert lumineux (élément signature) -->
  <g transform="translate(800,560)">
    <path d="M -220 40 Q -110 -30 0 10 Q 110 -30 220 40 L 220 70 Q 110 20 0 55 Q -110 20 -220 70 Z"
          fill="#F6EFE0" opacity="0.9"/>
    <path d="M 0 10 L 0 55" stroke="#C9A227" stroke-width="3" opacity="0.8"/>
    <path d="M -190 34 Q -95 -10 0 24" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.5"/>
    <path d="M 190 34 Q 95 -10 0 24" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.5"/>
  </g>
  <ellipse cx="800" cy="560" rx="260" ry="70" fill="url(#glow)" opacity="0.8"/>

  <!-- Poussière lumineuse -->
  <g fill="#C9A227" opacity="0.5">
    <circle cx="220" cy="180" r="2"/>
    <circle cx="380" cy="120" r="1.5"/>
    <circle cx="960" cy="150" r="2"/>
    <circle cx="1180" cy="220" r="1.5"/>
    <circle cx="700" cy="90"  r="1.5"/>
    <circle cx="1340" cy="100" r="2"/>
    <circle cx="140" cy="300" r="1.5"/>
    <circle cx="1420" cy="300" r="1.5"/>
  </g>

  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>